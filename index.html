<!doctype html>
<html lang="en">
  <head>
    <!-- BASIC -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- TITLE -->
    <title>CAPSTORE.KE — Premium Caps Nairobi</title>

    <!-- FAVICON -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- SEO -->
    <meta
      name="description"
      content="Premium fitted & snapback caps in Nairobi, Kenya. Authentic streetwear culture with fast delivery and WhatsApp ordering."
    />

    <meta
      name="keywords"
      content="caps kenya, fitted caps nairobi, snapback kenya, new era caps kenya, streetwear kenya"
    />

    <meta name="author" content="CAPSTORE.KE" />

    <!-- OPEN GRAPH / WHATSAPP / FACEBOOK -->
    <meta property="og:type" content="website" />

    <meta
      property="og:title"
      content="CAPSTORE.KE — Premium Caps Nairobi"
    />

    <meta
      property="og:description"
      content="Authentic fitted & snapback caps in Kenya. Curated for the city. Built for the culture."
    />

    <meta
      property="og:url"
      content="https://newera-world.vercel.app/"
    />

    <meta
      property="og:image"
      content="https://newera-world.vercel.app/og-image.jpg?v=2"
    />

    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:alt" content="CAPSTORE.KE Premium Caps" />

    <!-- TWITTER / X -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta
      name="twitter:title"
      content="CAPSTORE.KE — Premium Caps Nairobi"
    />

    <meta
      name="twitter:description"
      content="Premium fitted & snapback caps in Kenya."
    />

    <meta
      name="twitter:image"
      content="https://newera-world.vercel.app/og-image.jpg?v=2"
    />

    <!-- MOBILE THEME -->
    <meta name="theme-color" content="#00c8b4" />

    <!-- CANONICAL -->
    <link
      rel="canonical"
      href="https://newera-world.vercel.app/"
    />

    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Libre+Baskerville:wght@400;700&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- PRELOAD OG IMAGE -->
    <link
      rel="preload"
      as="image"
      href="/og-image.jpg"
    />

    <!-- LOADER + BACKGROUND -->
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #08090c;
        overflow-x: hidden;
      }

      body {
        font-family: 'Outfit', sans-serif;
      }

      /* PRELOADER */
      #preloader {
        position: fixed;
        inset: 0;
        background: #08090c;
        z-index: 99999;

        display: flex;
        align-items: center;
        justify-content: center;

        transition:
          opacity 0.5s ease,
          visibility 0.5s ease;
      }

      #preloader.hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .loader-wrap {
        width: min(280px, 80vw);
        text-align: center;
      }

      .loader-logo {
        font-family: 'Bebas Neue', sans-serif;
        font-size: clamp(34px, 8vw, 54px);
        letter-spacing: 4px;
        color: #f0f0f2;
        margin-bottom: 24px;
      }

      .loader-logo span {
        color: #00c8b4;
      }

      .loader-logo .ke {
        color: rgba(240, 240, 242, 0.45);
        font-size: 0.7em;
      }

      .loader-line {
        width: 100%;
        height: 3px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 999px;
        overflow: hidden;
        position: relative;
      }

      .loader-progress {
        position: absolute;
        inset: 0;
        width: 40%;
        background: #00c8b4;
        border-radius: inherit;
        animation: loading 1.1s ease-in-out infinite;
        box-shadow: 0 0 14px rgba(0, 200, 180, 0.45);
      }

      .loader-text {
        margin-top: 16px;
        font-size: 11px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: rgba(240, 240, 242, 0.4);
      }

      @keyframes loading {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(320%);
        }
      }

      /* Prevent white flash */
      #root {
        min-height: 100vh;
        background: #08090c;
      }
    </style>
  </head>

  <body>
    <!-- PRELOADER -->
    <div id="preloader">
      <div class="loader-wrap">
        <div class="loader-logo">
          <span>_.</span>CAPSTORE<span class="ke">.KE</span>
        </div>

        <div class="loader-line">
          <div class="loader-progress"></div>
        </div>

        <div class="loader-text">
          Loading premium caps...
        </div>
      </div>
    </div>

    <!-- REACT ROOT -->
    <div id="root"></div>

    <!-- REACT ENTRY -->
    <script type="module" src="/src/main.jsx"></script>

    <!-- REMOVE PRELOADER -->
    <script>
      window.addEventListener("load", () => {
        const preloader = document.getElementById("preloader");

        setTimeout(() => {
          preloader.classList.add("hide");
        }, 500);
      });
    </script>
  </body>
</html>
